# Reference Ranges for Common Biomarkers
# Based on WHO, ICMR, NHS, and Mayo Clinic standards
# Values may vary by lab and demographics

biomarkers:
  # Complete Blood Count (CBC)
  - name: "Hemoglobin"
    unit: "g/dL"
    male_range: [13.5, 17.5]
    female_range: [12.0, 15.5]
    category: "Complete Blood Count"
    critical_low: 7.0
    critical_high: 20.0

  - name: "Hematocrit"
    unit: "%"
    male_range: [38.8, 50.0]
    female_range: [34.9, 44.5]
    category: "Complete Blood Count"

  - name: "White Blood Cells"
    unit: "× 10^9/L"
    range: [4.0, 11.0]
    category: "Complete Blood Count"
    critical_low: 2.0
    critical_high: 30.0

  - name: "Platelets"
    unit: "× 10^9/L"
    range: [150, 400]
    category: "Complete Blood Count"
    critical_low: 50
    critical_high: 1000

  # Vitamins
  - name: "Vitamin D"
    aliases: ["25-OH Vitamin D", "25-Hydroxyvitamin D", "Vit D"]
    unit: "ng/mL"
    range: [30, 100]
    optimal: [40, 60]
    category: "Vitamins"
    deficient: [0, 20]
    insufficient: [20, 30]

  - name: "Vitamin B12"
    aliases: ["Cobalamin", "Vit B12"]
    unit: "pg/mL"
    range: [200, 900]
    optimal: [400, 700]
    category: "Vitamins"
    deficient: [0, 200]

  - name: "Folate"
    aliases: ["Folic Acid", "Vitamin B9"]
    unit: "ng/mL"
    range: [2.7, 17.0]
    category: "Vitamins"

  - name: "Vitamin A"
    aliases: ["Retinol"]
    unit: "μg/dL"
    range: [20, 80]
    category: "Vitamins"

  - name: "Vitamin E"
    unit: "mg/L"
    range: [5.0, 20.0]
    category: "Vitamins"

  - name: "Vitamin C"
    aliases: ["Ascorbic Acid"]
    unit: "mg/dL"
    range: [0.4, 2.0]
    category: "Vitamins"

  # Minerals
  - name: "Iron"
    aliases: ["Serum Iron", "Fe"]
    unit: "μg/dL"
    male_range: [60, 170]
    female_range: [50, 150]
    category: "Minerals"

  - name: "Ferritin"
    unit: "ng/mL"
    male_range: [24, 336]
    female_range: [11, 307]
    category: "Minerals"

  - name: "Calcium"
    aliases: ["Ca", "Serum Calcium"]
    unit: "mg/dL"
    range: [8.5, 10.5]
    category: "Minerals"
    critical_low: 7.0
    critical_high: 13.0

  - name: "Magnesium"
    aliases: ["Mg"]
    unit: "mg/dL"
    range: [1.7, 2.2]
    category: "Minerals"

  - name: "Zinc"
    aliases: ["Zn"]
    unit: "μg/dL"
    range: [60, 120]
    category: "Minerals"

  - name: "Potassium"
    aliases: ["K"]
    unit: "mEq/L"
    range: [3.5, 5.0]
    category: "Minerals"
    critical_low: 2.5
    critical_high: 6.5

  - name: "Sodium"
    aliases: ["Na"]
    unit: "mEq/L"
    range: [135, 145]
    category: "Minerals"
    critical_low: 120
    critical_high: 160

  # Liver Function
  - name: "ALT"
    aliases: ["SGPT", "Alanine Aminotransferase"]
    unit: "U/L"
    range: [7, 56]
    category: "Liver Function"

  - name: "AST"
    aliases: ["SGOT", "Aspartate Aminotransferase"]
    unit: "U/L"
    range: [10, 40]
    category: "Liver Function"

  - name: "Bilirubin Total"
    unit: "mg/dL"
    range: [0.1, 1.2]
    category: "Liver Function"

  # Kidney Function
  - name: "Creatinine"
    unit: "mg/dL"
    male_range: [0.7, 1.3]
    female_range: [0.6, 1.1]
    category: "Kidney Function"

  - name: "BUN"
    aliases: ["Blood Urea Nitrogen", "Urea"]
    unit: "mg/dL"
    range: [7, 20]
    category: "Kidney Function"

  # Lipid Profile
  - name: "Total Cholesterol"
    unit: "mg/dL"
    desirable: [0, 200]
    borderline: [200, 239]
    high: [240, 999]
    category: "Lipid Profile"

  - name: "LDL Cholesterol"
    aliases: ["LDL", "Bad Cholesterol"]
    unit: "mg/dL"
    optimal: [0, 100]
    near_optimal: [100, 129]
    borderline: [130, 159]
    high: [160, 999]
    category: "Lipid Profile"

  - name: "HDL Cholesterol"
    aliases: ["HDL", "Good Cholesterol"]
    unit: "mg/dL"
    male_low: [0, 40]
    female_low: [0, 50]
    optimal: [60, 999]
    category: "Lipid Profile"

  - name: "Triglycerides"
    unit: "mg/dL"
    normal: [0, 150]
    borderline: [150, 199]
    high: [200, 499]
    very_high: [500, 999]
    category: "Lipid Profile"

  # Glucose and Diabetes
  - name: "Fasting Glucose"
    aliases: ["Blood Sugar", "Fasting Blood Sugar", "FBS"]
    unit: "mg/dL"
    normal: [70, 100]
    prediabetes: [100, 125]
    diabetes: [126, 999]
    category: "Glucose Metabolism"

  - name: "HbA1c"
    aliases: ["Glycated Hemoglobin", "A1C"]
    unit: "%"
    normal: [4.0, 5.6]
    prediabetes: [5.7, 6.4]
    diabetes: [6.5, 15.0]
    category: "Glucose Metabolism"

  # Thyroid
  - name: "TSH"
    aliases: ["Thyroid Stimulating Hormone"]
    unit: "mIU/L"
    range: [0.4, 4.0]
    category: "Thyroid Function"

  - name: "Free T4"
    aliases: ["FT4", "Thyroxine"]
    unit: "ng/dL"
    range: [0.8, 1.8]
    category: "Thyroid Function"

  - name: "Free T3"
    aliases: ["FT3", "Triiodothyronine"]
    unit: "pg/mL"
    range: [2.3, 4.2]
    category: "Thyroid Function"

notes:
  - "Reference ranges may vary by laboratory and testing methodology"
  - "Age, gender, and pregnancy status can affect normal ranges"
  - "Critical values require immediate medical attention"
  - "Always interpret results in clinical context"

sources:
  - "WHO International Standards"
  - "ICMR Guidelines 2020"
  - "NHS Reference Ranges"
  - "Mayo Clinic Laboratory Reference Values"

version: "1.0"
last_updated: "2026-01-12"
