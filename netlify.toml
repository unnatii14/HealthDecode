[build]
  # Build command for Vite
  command = "npm run build"
  # Output directory for built files
  publish = "dist"

[build.environment]
  # Node version (Vite 6 + Tailwind v4 need a modern Node)
  NODE_VERSION = "20"

# SPA fallback: serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# NOTE: The frontend runs fully client-side (PDF parsing, OCR and biomarker
# detection happen in the browser), so no backend is required for the live demo.
# If you later deploy the FastAPI backend, add a proxy here, e.g.:
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-BACKEND.onrender.com/api/:splat"
#   status = 200
#   force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
